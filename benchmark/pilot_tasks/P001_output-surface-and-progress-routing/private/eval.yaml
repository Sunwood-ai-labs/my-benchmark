case_id: "P001"
score_scale: "0-10"
benchmark_weight: 5
task_type: "targeted_bugfix"
difficulty: "medium"
status: "active"
version: "1.3"
scoring_dimensions:
  - "出力面の適合度"
  - "進捗可視性"
  - "差分の局所性"
  - "検証の具体性"
automatic_checks:
  - "チャット向け出力に raw debug token 列が残っていない"
  - "CLI 向けログに少なくとも 1 つの進捗または詳細診断が残る"
  - "既存 focused smoke が落ちない"
  - "debug artifact を残す場合、その artifact とチャット本文の責務が混線していない"
required_evidence:
  - "final diff"
  - "final response"
  - "executed check log"
  - "surface-specific output sample if available"
auto_check_contract:
  - check_id: "chat_surface_clean"
    target: "chat-facing output"
    pass_when: "raw debug token 列や低レベル診断がチャット面に残っていない"
    fail_when: "チャット面に内部診断がそのまま流れている"
  - check_id: "cli_surface_observable"
    target: "CLI log"
    pass_when: "進捗または詳細診断のどちらかが CLI から追える"
    fail_when: "CLI 側も無言になって調査不能になる"
  - check_id: "focused_smoke_passes"
    target: "existing focused smoke"
    pass_when: "既存 focused smoke が通る"
    fail_when: "既存 focused smoke が落ちる"
hard_fail_conditions:
  - "チャットに低レベル診断ログがそのまま残る"
  - "CLI 側も無言になって調査不能になる"
  - "秘密情報や内部識別子を新規露出する"
partial_credit_rules:
  - "チャットのノイズだけ下がったが、CLI 側の観測性が弱い場合は 6 点止まり。"
  - "分離方針は妥当でも実行済み検証がない場合は 6 点上限。"
score_anchors:
  "10": "チャット面のノイズ除去と CLI の可観測性が両立し、実行済み検証も強く、差分も局所。"
  "9": "ほぼ理想形で、細かな説明不足だけが残る。"
  "8": "意図した分離は達成し、evidence も十分にある。"
  "7": "分離方針は良く、検証も概ね妥当だが一段弱い。"
  "6": "方向性は正しいが、実行済み検証や surface sample が弱い。"
  "5": "ノイズは減ったが CLI 側の観測性か責務分離の説明が弱い。"
  "4": "一部改善はあるが、面の責務がまだかなり混線している。"
  "3": "改善は小さく、routing 問題の中心を捉え切れていない。"
  "2": "要求理解が弱く、分離より別の話へ逸れている。"
  "1": "チャットまたは CLI のどちらかを実質的に壊す危険が高い。"
aggregation_notes:
  - "hard fail が成立したら case score は 0"
  - "automatic_checks と score_anchors が衝突する場合は hard_fail_conditions と focused smoke の結果を優先する"
primary_metrics:
  - "instruction_following"
  - "bugfix_convergence"
secondary_metrics:
  - "overchange_penalty"
  - "explanation_usefulness"
acceptance_alignment_signals:
  - "surface_fit"
