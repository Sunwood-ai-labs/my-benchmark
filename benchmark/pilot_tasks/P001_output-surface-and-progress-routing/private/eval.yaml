case_id: "P001"
score_scale: "0-10"
benchmark_weight: 5
task_type: "targeted_bugfix"
difficulty: "medium"
status: "active"
version: "1.4"

scoring_dimensions:
  - "surface_fit"
  - "artifact_quality"
  - "verification_quality"
  - "scope_control"

artifact_first_policy:
  primary_artifacts:
    - "chat-facing output"
    - "CLI-facing output"
    - "final response"
  secondary_scope_checks:
    - "touched-file locality"
  no_artifact_cap: 3

automatic_checks:
  - "chat-facing output does not contain raw debug detail"
  - "CLI-side sample or log shows detailed progress or diagnostics"
  - "focused smoke passes if runnable"

required_evidence:
  - "final response"
  - "generated CLI sample or log excerpt"
  - "generated chat-facing sample if available"
  - "executed check log"
  - "artifact reference if debug output was separated"

auto_check_contract:
  - check_id: "chat_surface_clean"
    target: "chat-facing output"
    pass_when: "chat-facing output contains short human-readable progress only"
    fail_when: "raw debug detail or verbose diagnostics leak into the chat surface"
  - check_id: "cli_surface_observable"
    target: "CLI log or sample"
    pass_when: "CLI-facing output shows detailed progress or diagnostics"
    fail_when: "CLI side becomes empty, vague, or equivalent to the chat summary"
  - check_id: "focused_smoke_passes"
    target: "existing focused smoke"
    pass_when: "focused smoke passes"
    fail_when: "focused smoke fails"

hard_fail_conditions:
  - "raw debug detail is routed into the chat-facing output"
  - "CLI-side detailed output disappears completely"
  - "unrelated subsystems are rewritten to satisfy the case"

partial_credit_rules:
  - "routing direction is correct but no generated surface sample or executed log is shown: cap at 6"
  - "explanation is strong but the operator-facing output is still not demonstrated: cap at 6"

score_anchors:
  "10": "chat and CLI both have correct generated outputs, validation passes, and scope stays tight"
  "9": "artifact quality is almost complete, with only a minor evidence gap"
  "8": "surface routing is correct and artifacts are strong, but one verification detail is thin"
  "7": "artifact direction is correct and mostly usable, but evidence is incomplete"
  "6": "logic is correct, but generated output samples or execution evidence are thin"
  "5": "reasoning is plausible, but generated outputs are weak or ambiguous"
  "4": "partial fix exists, but the surface behavior is still not acceptably demonstrated"
  "3": "describes a fix but does not produce a meaningful output artifact"
  "2": "misreads the routing intent or outputs the wrong surface behavior"
  "1": "routes the wrong content to the wrong surface and breaks the task intent"

aggregation_notes:
  - "hard fail sets the case score to 0"
  - "if no meaningful generated artifact exists, apply the no_artifact_cap"

primary_metrics:
  - "instruction_following"
  - "bugfix_convergence"
secondary_metrics:
  - "overchange_penalty"
  - "explanation_usefulness"
acceptance_alignment_signals:
  - "surface_fit"
