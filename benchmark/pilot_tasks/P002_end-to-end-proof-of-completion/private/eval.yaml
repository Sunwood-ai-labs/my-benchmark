case_id: "P002"
score_scale: "0-10"
benchmark_weight: 5
task_type: "test_extension"
difficulty: "medium"
status: "active"
version: "1.4"

scoring_dimensions:
  - "completion_boundary"
  - "artifact_quality"
  - "verification_quality"
  - "blocked_reporting"

artifact_first_policy:
  primary_artifacts:
    - "completion proof artifact reference"
    - "final response"
    - "executed test or check log"
  secondary_scope_checks:
    - "assertion locality"
  no_artifact_cap: 3

automatic_checks:
  - "completion assertion exists and is tied to a real proof artifact"
  - "existing check path passes or the blocked state is explicitly justified"
  - "final response names the completion proof artifact"

required_evidence:
  - "final response"
  - "completion proof artifact reference"
  - "executed test or check log"
  - "generated completion-oriented output"

auto_check_contract:
  - check_id: "completion_assertion_exists"
    target: "history or artifact assertion"
    pass_when: "final pass is tied to a real completion proof artifact"
    fail_when: "done is claimed without a real terminal proof"
  - check_id: "existing_check_path"
    target: "existing test command or blocked explanation"
    pass_when: "an existing check passes or a blocked condition is explicitly justified"
    fail_when: "neither a check result nor a blocked explanation is provided"
  - check_id: "completion_proof_named"
    target: "final response"
    pass_when: "the final response names the completion proof artifact"
    fail_when: "the response says done without naming the proof object"

hard_fail_conditions:
  - "claims completion without a completion-proof artifact"
  - "relabels an intermediate signal as final completion"

partial_credit_rules:
  - "completion logic is strong but no concrete proof artifact is surfaced: cap at 6"

score_anchors:
  "10": "final completion is tied to a concrete proof artifact, checks are run or blocked correctly, and the boundary is explicit"
  "9": "terminal proof is present, with only a small evidence gap"
  "8": "completion boundary is correct and artifacts are strong, but one proof detail is thin"
  "7": "good completion logic and some proof output, but not enough end-state evidence"
  "6": "strongest logic is present, but proof artifacts or test evidence are still incomplete"
  "5": "the direction is plausible, but completion proof remains weak"
  "4": "partial understanding exists, but the terminal boundary is still shaky"
  "3": "describes the idea without producing a meaningful completion artifact"
  "2": "leans toward false done"
  "1": "claims done without real completion proof"

aggregation_notes:
  - "hard fail sets the case score to 0"
  - "if no meaningful generated artifact exists, apply the no_artifact_cap"

primary_metrics:
  - "test_retention"
  - "instruction_following"
secondary_metrics:
  - "bugfix_convergence"
  - "explanation_usefulness"
acceptance_alignment_signals:
  - "false_done_penalty"
  - "verification_gap"
