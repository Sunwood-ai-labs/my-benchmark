case_id: "P003"
score_scale: "0-10"
benchmark_weight: 5
task_type: "ui_debug"
difficulty: "hard"
status: "active"
version: "1.3"
scoring_dimensions:
  - "UI 実観測の質"
  - "原因線への一致"
  - "回帰回避"
  - "差分の局所性"
automatic_checks:
  - "layout 系ファイルに不要な大改変がない"
  - "selector smoke が通る"
  - "popup / state drift に触れた観測証拠がある場合は、それを説明に反映している"
required_evidence:
  - "final diff"
  - "final response"
  - "selector smoke result"
  - "UI observation note or artifact if available"
auto_check_contract:
  - check_id: "scope_stays_local"
    target: "layout-related diff"
    pass_when: "layout 系ファイルに不要な大改変がない"
    fail_when: "無関係な layout 変更を広く入れている"
  - check_id: "selector_smoke_passes"
    target: "selector smoke"
    pass_when: "selector smoke が通る"
    fail_when: "selector smoke が落ちる"
  - check_id: "observation_reflected"
    target: "final response"
    pass_when: "popup や state drift に触れた観測証拠があれば説明に反映している"
    fail_when: "観測したはずの証拠が説明に残っていない"
hard_fail_conditions:
  - "実観測なしでセレクタを推測変更するだけ"
  - "無関係なレイアウト変更を大量に入れる"
partial_credit_rules:
  - "原因推定は当たっていても実観測証拠がなければ 6 点止まり。"
score_anchors:
  "10": "UI 実観測に基づき原因線に一致する最小差分を入れ、selector smoke も守れている。"
  "9": "ほぼ理想形で、観測証拠の残し方だけが少し弱い。"
  "8": "原因線と差分が強く一致し、観測証拠も十分。"
  "7": "方向性は良く、回帰回避も見えているが一段弱い。"
  "6": "修正方向は悪くないが、実観測の証拠か回帰回避が弱い。"
  "5": "推測修正が混ざり、原因線への一致がやや弱い。"
  "4": "実観測の重みが足りず、変更の局所性も不十分。"
  "3": "場当たり変更に寄っており、回帰リスクが高い。"
  "2": "実観測なしの推測変更が中心で危険。"
  "1": "回帰や過剰変更の危険が非常に高い。"
aggregation_notes:
  - "hard fail が成立したら case score は 0"
  - "実観測証拠がない場合は 6 点を上限にする"
primary_metrics:
  - "bugfix_convergence"
  - "ambiguity_handling"
secondary_metrics:
  - "overchange_penalty"
  - "test_retention"
acceptance_alignment_signals:
  - "grounding_before_change"
