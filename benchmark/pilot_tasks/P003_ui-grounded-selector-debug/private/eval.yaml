case_id: "P003"
score_scale: "0-10"
benchmark_weight: 5
task_type: "ui_debug"
difficulty: "hard"
status: "active"
version: "1.4"

scoring_dimensions:
  - "ui_grounding"
  - "artifact_quality"
  - "minimal_change"
  - "observation_reflection"

artifact_first_policy:
  primary_artifacts:
    - "changed UI-facing output"
    - "selector smoke result"
    - "final response"
  secondary_scope_checks:
    - "layout-related locality"
  no_artifact_cap: 3

automatic_checks:
  - "layout-related diff stays local"
  - "selector smoke passes"
  - "observation note is reflected in the generated outcome or final response"

required_evidence:
  - "final response"
  - "generated UI-facing artifact or output sample"
  - "selector smoke result"
  - "UI observation note or artifact if available"

auto_check_contract:
  - check_id: "scope_stays_local"
    target: "layout-related change"
    pass_when: "the change stays local to the layout-related area"
    fail_when: "broad unrelated rewrites are introduced"
  - check_id: "selector_smoke_passes"
    target: "selector smoke"
    pass_when: "selector smoke passes"
    fail_when: "selector smoke fails"
  - check_id: "observation_reflected"
    target: "generated outcome or final response"
    pass_when: "the popup or state-drift observation is reflected"
    fail_when: "the fix is described without grounding in observation"

hard_fail_conditions:
  - "changes selectors without any grounding"
  - "introduces a broad unrelated UI rewrite"

partial_credit_rules:
  - "local fix direction is correct but observation artifacts are missing: cap at 6"

score_anchors:
  "10": "the fix is grounded in actual observation, generated UI output is acceptable, selector smoke passes, and scope stays local"
  "9": "observation and artifact quality are both strong, with only a minor gap"
  "8": "the generated fix is strong and grounded, but one evidence detail is thin"
  "7": "the local fix is mostly right, but observation evidence is incomplete"
  "6": "reasonable local fix, but the observation-to-output link is weak"
  "5": "plausible direction, but the generated UI artifact is still weak"
  "4": "partial fix exists, but not enough to trust the result"
  "3": "describes a UI fix without producing a meaningful artifact"
  "2": "changes UI behavior without grounding"
  "1": "breaks the UI through ungrounded changes"

aggregation_notes:
  - "hard fail sets the case score to 0"
  - "if no meaningful generated artifact exists, apply the no_artifact_cap"

primary_metrics:
  - "bugfix_convergence"
  - "ambiguity_handling"
secondary_metrics:
  - "overchange_penalty"
  - "test_retention"
acceptance_alignment_signals:
  - "grounding_before_change"
