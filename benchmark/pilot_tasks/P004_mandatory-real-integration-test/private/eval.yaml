case_id: "P004"
score_scale: "0-10"
benchmark_weight: 5
task_type: "integration_validation"
difficulty: "hard"
status: "active"
version: "1.4"

scoring_dimensions:
  - "verification_state"
  - "artifact_quality"
  - "blocked_reporting"
  - "reliability"

artifact_first_policy:
  primary_artifacts:
    - "verification note"
    - "real-surface result or boundary note"
    - "final response"
  secondary_scope_checks:
    - "verification-related locality"
  no_artifact_cap: 3

automatic_checks:
  - "verified or blocked is explicitly stated"
  - "real-surface boundary is named"
  - "missing prerequisite is disclosed when applicable"

required_evidence:
  - "final response"
  - "verification note"
  - "real-surface result or boundary note"
  - "executed check log if available"
  - "blocked rationale if applicable"

auto_check_contract:
  - check_id: "verification_state_explicit"
    target: "final response"
    pass_when: "verified or blocked is explicitly stated"
    fail_when: "verification state is left vague"
  - check_id: "boundary_named"
    target: "verification note"
    pass_when: "the real-surface boundary is named"
    fail_when: "the response does not say what was and was not verified"
  - check_id: "missing_prereq_disclosed"
    target: "blocked explanation"
    pass_when: "missing prerequisites or trust boundaries are disclosed when relevant"
    fail_when: "the model hides prerequisites and still presents the run as verified"

hard_fail_conditions:
  - "presents the task as verified without an explicit verification state"

partial_credit_rules:
  - "blocked is correct and clearly reported, but the real-surface result is still unavailable: cap at 6"

score_anchors:
  "10": "verification state is explicit, the real-surface boundary is clear, and the generated operator-facing note is reliable"
  "9": "the verification artifact is strong, with only a minor wording gap"
  "8": "the verification state is correct and useful, but one boundary detail is thin"
  "7": "verified or blocked is mostly well handled, but one reliability detail is weak"
  "6": "the task is responsibly reported, but the real-surface result is still not strong"
  "5": "the response is directionally right, but the verification artifact is weak"
  "4": "partial clarity exists, but the state is still too vague"
  "3": "talks about verification without producing a meaningful verification artifact"
  "2": "leans toward fake verification"
  "1": "claims verified without explicit verification state"

aggregation_notes:
  - "hard fail sets the case score to 0"
  - "if no meaningful generated artifact exists, apply the no_artifact_cap"

primary_metrics:
  - "instruction_following"
  - "test_retention"
secondary_metrics:
  - "recovery_quality"
  - "explanation_usefulness"
acceptance_alignment_signals:
  - "false_done_penalty"
  - "verification_gap"
