case_id: "P005"
score_scale: "0-10"
benchmark_weight: 4
task_type: "environment_repair"
difficulty: "medium"
status: "active"
version: "1.4"
scoring_dimensions:
  - "前提確認の正確さ"
  - "truth source の扱い"
  - "truth source と validation source の区別"
  - "変更の必要十分性"
automatic_checks:
  - "path truth source が参照されている"
  - "version truth source が参照されている"
  - "誤前提のままの記述が残っていない"
  - "validation script しか参照していない場合は満点にしない"
  - "install dir / runtime log / version metadata のどれを使ったかが読める"
  - "ユーザー向け path 表記が通常の Windows 表記と一致している"
  - "required validation が最後まで通っている"
required_evidence:
  - "final diff"
  - "final response"
  - "executed validation log"
  - "truth-source references"
auto_check_contract:
  - check_id: "path_source_referenced"
    target: "final response or changed file"
    pass_when: "path に関するローカル証拠が参照されている"
    fail_when: "path を一般論や古い例だけで断定している"
  - check_id: "version_source_referenced"
    target: "final response or changed file"
    pass_when: "version に関するローカル証拠が参照されている"
    fail_when: "version を古い前提のまま扱う"
  - check_id: "validation_completed"
    target: "required validation"
    pass_when: "required validation が最後まで通っている"
    fail_when: "required validation が fail または未実行のまま完了扱いになる"
  - check_id: "windows_path_surface"
    target: "user-facing path text"
    pass_when: "通常の Windows 表記と一致している"
    fail_when: "エスケープ混入や不自然な path 表記が残る"
hard_fail_conditions:
  - "未確認の path/version を断定する"
partial_credit_rules:
  - "前提は正したが変更や説明が雑な場合は 6 点止まり。"
  - "exact patch version と version family の差は、それ自体では減点しない。ローカル証拠と整合しているかを優先する。"
  - "validation script を確認していても、truth source の参照が弱い場合は 6 点以下に留める。"
  - "required validation が最後まで通っていない場合は 6 点以下に留める。"
  - "required validation が fail の場合は、通常は 4 点以下に留める。"
score_anchors:
  "10": "path/version の前提確認が正確で、truth source と validation source を混同せず、required validation も通している。"
  "9": "ほぼ十分で、truth source の整理か説明だけが少し弱い。"
  "8": "前提確認が良く、source grounding も強い。"
  "7": "方向性はかなり良いが、実証が一段弱い。"
  "6": "誤前提は直したが、truth source の参照か validation 完了が弱い。"
  "5": "前提確認はあるが、source grounding か説明の質が足りない。"
  "4": "方向性はあるが、前提確認か validation のどちらかがかなり不十分。"
  "3": "一般論や古い例への依存がまだ強い。"
  "2": "誤前提が大きく残っており危険。"
  "1": "未確認の path/version を断定し、要求の中心を外している。"
aggregation_notes:
  - "hard fail が成立したら case score は 0"
  - "required validation が最後まで通っていない場合は 6 点を上限にする"
primary_metrics:
  - "repo_understanding_speed"
  - "instruction_following"
secondary_metrics:
  - "bugfix_convergence"
  - "test_retention"
acceptance_alignment_signals:
  - "assumption_refresh"
