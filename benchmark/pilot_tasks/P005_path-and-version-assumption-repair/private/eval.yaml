case_id: "P005"
score_scale: "0-10"
benchmark_weight: 4
task_type: "environment_repair"
difficulty: "medium"
status: "active"
version: "1.5"

scoring_dimensions:
  - "truth_source_grounding"
  - "artifact_quality"
  - "validation_quality"
  - "scope_control"

artifact_first_policy:
  primary_artifacts:
    - "generated user-facing artifact"
    - "executed validation log"
    - "final response"
  secondary_scope_checks:
    - "changed-file locality"
  no_artifact_cap: 3

automatic_checks:
  - "path truth source is referenced"
  - "version truth source is referenced"
  - "required validation completes successfully"
  - "user-facing path stays in normal Windows form"

required_evidence:
  - "final response"
  - "generated user-facing artifact"
  - "executed validation log"
  - "truth-source references"

auto_check_contract:
  - check_id: "path_source_referenced"
    target: "final response or generated artifact"
    pass_when: "path truth source is explicitly referenced"
    fail_when: "path is guessed from stale defaults or examples"
  - check_id: "version_source_referenced"
    target: "final response or generated artifact"
    pass_when: "version truth source is explicitly referenced"
    fail_when: "version is stated without grounding"
  - check_id: "validation_completed"
    target: "required validation"
    pass_when: "required validation completes successfully"
    fail_when: "required validation fails or is skipped without a justified block"
  - check_id: "windows_path_surface"
    target: "user-facing artifact"
    pass_when: "the user-facing path is written in normal Windows form"
    fail_when: "the path surface is escaped or otherwise awkward"

hard_fail_conditions:
  - "changes path or version without real grounding"

partial_credit_rules:
  - "grounding direction is correct but explicit truth-source references are thin: cap at 6"
  - "validation is attempted but not completed: cap at 6"
  - "required validation fails: cap at 4"

score_anchors:
  "10": "the user-facing artifact is correct, truth sources are explicit, validation passes, and scope stays tight"
  "9": "artifact quality is very strong, with only a small grounding gap"
  "8": "grounding and output are both strong, but one evidence detail is thin"
  "7": "the direction is right and mostly usable, but proof is still incomplete"
  "6": "the generated artifact is mostly right, but source proof or validation is incomplete"
  "5": "good grounding direction, but the artifact is still weak or thinly proven"
  "4": "some repair exists, but it is not yet acceptable"
  "3": "describes the repair without producing a meaningful user-facing artifact"
  "2": "changes path or version with weak grounding"
  "1": "hallucinates path or version and presents it as verified"

aggregation_notes:
  - "hard fail sets the case score to 0"
  - "if no meaningful generated artifact exists, apply the no_artifact_cap"

primary_metrics:
  - "repo_understanding_speed"
  - "instruction_following"
secondary_metrics:
  - "bugfix_convergence"
  - "test_retention"
acceptance_alignment_signals:
  - "assumption_refresh"
